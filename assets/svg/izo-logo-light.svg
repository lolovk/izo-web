<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" fill="none">
  <style>
    .block-face  { fill: var(--izo-concrete-400, #B8B5B0); }
    .block-top   { fill: var(--izo-concrete-300, #D4D1CC); }
    .block-side  { fill: var(--izo-concrete-500, #9A9690); }
    .accent      { fill: var(--izo-primary, #2B4FDB); }
    .letter-fill { fill: var(--izo-concrete-400, #B8B5B0); }
    .letter-line { stroke: var(--izo-concrete-400, #B8B5B0); fill: none; stroke-width: 2.5; }
    .tagline     { fill: var(--izo-concrete-600, #7A7670); font-family: 'Barlow', sans-serif; font-size: 13.5px; font-weight: 500; letter-spacing: 3.5px; }
  </style>

  <!-- ===== ANAGRAMA: 3 bloques isométricos con franjas azules ===== -->
  <g id="blocks" transform="translate(10, 5)">
    <!-- Bloque 1 (superior) -->
    <!-- Cara frontal -->
    <polygon class="block-face" points="15,10 145,10 145,48 15,48"/>
    <!-- Cara superior (perspectiva) -->
    <polygon class="block-top" points="15,10 145,10 160,0 30,0"/>
    <!-- Cara lateral derecha (perspectiva) -->
    <polygon class="block-side" points="145,10 160,0 160,38 145,48"/>

    <!-- Franja azul 1 -->
    <polygon class="accent" points="5,52 155,52 155,60 5,60"/>
    <!-- Sombra sutil de la franja -->
    <polygon class="accent" points="155,52 168,43 168,51 155,60" opacity="0.7"/>

    <!-- Bloque 2 (central) -->
    <polygon class="block-face" points="15,64 145,64 145,102 15,102"/>
    <polygon class="block-top" points="15,64 145,64 160,54 30,54"/>
    <polygon class="block-side" points="145,64 160,54 160,92 145,102"/>

    <!-- Franja azul 2 -->
    <polygon class="accent" points="5,106 155,106 155,114 5,114"/>
    <polygon class="accent" points="155,106 168,97 168,105 155,114" opacity="0.7"/>

    <!-- Bloque 3 (inferior) -->
    <polygon class="block-face" points="15,118 145,118 145,156 15,156"/>
    <polygon class="block-top" points="15,118 145,118 160,108 30,108"/>
    <polygon class="block-side" points="145,118 160,108 160,146 145,156"/>
  </g>

  <!-- ===== LETRAS IZO ===== -->
  <g id="izo-letters" transform="translate(200, 10)">

    <!-- I: dos líneas verticales finas + barra central gruesa -->
    <rect class="letter-fill" x="0"  y="0" width="5"  height="146" rx="1"/>
    <rect class="letter-fill" x="15" y="0" width="14" height="146" rx="1"/>
    <rect class="letter-fill" x="41" y="0" width="5"  height="146" rx="1"/>
    <!-- Separación fina entre I y Z -->

    <!-- Z: enmarcada en rectángulo -->
    <g transform="translate(62, 0)">
      <!-- Marco exterior -->
      <rect class="letter-line" x="0" y="0" width="100" height="146" rx="3"/>
      <!-- Barra horizontal superior -->
      <rect class="letter-fill" x="12" y="12" width="76" height="14" rx="1"/>
      <!-- Diagonal -->
      <polygon class="letter-fill" points="72,26 88,26 28,120 12,120"/>
      <!-- Barra horizontal inferior -->
      <rect class="letter-fill" x="12" y="120" width="76" height="14" rx="1"/>
    </g>

    <!-- O: dentro de un círculo -->
    <g transform="translate(180, 0)">
      <!-- Círculo exterior -->
      <circle class="letter-line" cx="73" cy="73" r="72"/>
      <!-- Forma O: rectángulo exterior con hueco interior -->
      <!-- Barra izquierda -->
      <rect class="letter-fill" x="30" y="22" width="16" height="102" rx="3"/>
      <!-- Barra derecha -->
      <rect class="letter-fill" x="100" y="22" width="16" height="102" rx="3"/>
      <!-- Barra superior -->
      <rect class="letter-fill" x="30" y="22" width="86" height="16" rx="3"/>
      <!-- Barra inferior -->
      <rect class="letter-fill" x="30" y="108" width="86" height="16" rx="3"/>
    </g>
  </g>

  <!-- ===== TAGLINE ===== -->
  <text class="tagline" x="200" y="175">PLACAS DE HORMIGÓN ALIGERADO</text>
</svg>
